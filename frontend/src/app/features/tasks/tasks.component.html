<div class="flex h-screen bg-gray-100">
  <div class="w-64 bg-white shadow-md flex flex-col">
    <div class="p-4 border-b">
      <h2 class="text-lg font-semibold text-gray-800">My Lists</h2>
    </div>
    <nav class="flex-1 p-4">
      <ul class="space-y-1">
        <li class="px-3 py-2 rounded-md bg-blue-50 text-blue-600 font-medium cursor-pointer">
          📋 All Tasks
        </li>
        <li class="px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 cursor-pointer">📁 Work</li>
      </ul>
    </nav>
    <div class="p-4 border-t">
      <button class="w-full text-left text-blue-600 hover:text-blue-700">+ New List</button>
    </div>
  </div>

  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-800">All Tasks</h1>
      <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
        + Add Task
      </button>
    </div>

    <div class="px-6 py-4 bg-white border-b flex gap-4">
      <input
        type="text"
        (input)="onSearch($event)"
        placeholder="Search tasks..."
        class="flex-1 border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <select
        (change)="onStatusChange($event)"
        class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none"
      >
        <option value="">All Statuses</option>
        <option value="Todo">Todo</option>
        <option value="InProgress">In Progress</option>
        <option value="Done">Done</option>
      </select>
    </div>

    <div class="flex-1 overflow-y-auto p-6">
      <div class="space-y-2">
        @if (tasks$ | async; as pagedResult) {
          @for (task of pagedResult.items; track task.id) {
            <div
              class="bg-white rounded-lg shadow-sm p-4 flex items-center gap-4 hover:shadow-md transition cursor-pointer"
            >
              <input
                type="checkbox"
                [checked]="task.status === 'Done'"
                class="w-5 h-5 accent-blue-600"
              />
              <div class="flex-1">
                <p
                  class="font-medium"
                  [class.line-through]="task.status === 'Done'"
                  [class.text-gray-400]="task.status === 'Done'"
                >
                  {{ task.title }}
                </p>
                <p class="text-sm text-gray-500">{{ task.description }}</p>
              </div>
              <span
                class="text-xs px-2 py-1 rounded-full"
                [class]="
                  task.status === 'Done'
                    ? 'bg-green-100 text-green-700'
                    : task.status === 'InProgress'
                      ? 'bg-yellow-100 text-yellow-700'
                      : 'bg-gray-100 text-gray-600'
                "
              >
                {{ task.status }}
              </span>
              <button class="text-gray-400 hover:text-red-500">✕</button>
            </div>
          }
        }
      </div>
    </div>

    <div class="bg-white border-t px-6 py-3 flex items-center justify-center gap-2">
      <button class="px-3 py-1 rounded border hover:bg-gray-100">←</button>
      <span class="px-3 py-1 rounded bg-blue-600 text-white">1</span>
      <span class="px-3 py-1 rounded hover:bg-gray-100 cursor-pointer">2</span>
      <span class="px-3 py-1 rounded hover:bg-gray-100 cursor-pointer">3</span>
      <button class="px-3 py-1 rounded border hover:bg-gray-100">→</button>
    </div>
  </div>
</div>

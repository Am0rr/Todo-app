<div class="flex flex-col h-screen bg-gray-100">
  <app-navbar />

  <div class="flex flex-1 overflow-hidden border-t border-gray-200">
    @if (categories$ | async; as categories) {
      <app-sidebar
        [categories]="categories"
        [selectedCategoryId]="selectedCategoryId"
        (categorySelected)="onCategorySelected($event)"
        (categoryAdded)="onCategoryAdded()"
        (categoryDeleted)="onCategoryDeleted($event)"
        (categoryEdited)="onCategoryEdited()"
      />
    }

    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="h-16 bg-white px-6 border-b border-gray-200 flex items-center justify-between">
        <h1 class="text-xl font-semibold text-gray-800">{{ selectedCategoryName }}</h1>
        <button
          (click)="openCreateModal()"
          class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700"
        >
          + Add Task
        </button>
      </div>

      <app-task-filter-bar
        (searchChange)="onSearchChange($event)"
        (statusChange)="onStatusChange($event)"
      />

      @if (tasks$ | async; as pagedResult) {
        <app-task-list
          [pagedResult]="pagedResult"
          (edit)="openEditModal($event)"
          (delete)="onDeleteTask($event)"
          (toggleStatus)="onToggleStatus($event)"
          (pageChange)="onPageChange($event)"
        />
      }
    </div>
  </div>
</div>

@if (showTaskModal) {
  <app-task-modal
    [task]="modalTask"
    [categories$]="categories$"
    (save)="onSaveTask($event)"
    (cancel)="closeModal()"
  />
}

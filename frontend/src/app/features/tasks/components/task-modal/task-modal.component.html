<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
    <h2 class="text-lg font-semibold mb-4">{{ isEditMode ? 'Edit Task' : 'New Task' }}</h2>

    <form (ngSubmit)="onSaveTask()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input
          type="text"
          name="title"
          [(ngModel)]="form.title"
          placeholder="Task title"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        @if (error) {
          <p class="text-red-500 text-sm mb-3">{{ error }}</p>
        }
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea
          name="description"
          [(ngModel)]="form.description"
          placeholder="Description (optional)"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 h-24 resize-none"
        ></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select
          name="categoryId"
          [(ngModel)]="form.categoryId"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none"
        >
          <option value="">No category</option>
          @if (categories$ | async; as categories) {
            @for (category of categories; track category.id) {
              <option [value]="category.id">{{ category.name }}</option>
            }
          }
        </select>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select
          name="status"
          [(ngModel)]="form.status"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none"
        >
          <option value="Todo">Todo</option>
          <option value="InProgress">In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <div class="flex gap-3 justify-end">
        <button
          type="button"
          (click)="cancel.emit()"
          class="px-4 py-2 text-gray-600 hover:text-gray-800"
        >
          Cancel
        </button>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
          {{ isEditMode ? 'Save Changes' : 'Add Task' }}
        </button>
      </div>
    </form>
  </div>
</div>

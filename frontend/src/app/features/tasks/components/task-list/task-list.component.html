<div class="flex-1 overflow-y-auto p-6">
  <div class="space-y-2">
    @for (task of pagedResult.items; track task.id) {
      <app-task-card
        [task]="task"
        (edit)="edit.emit($event)"
        (delete)="delete.emit($event)"
        (toggleStatus)="toggleStatus.emit($event)"
      />
    }
  </div>
</div>

@if (pagedResult.totalPages > 1) {
  <div class="bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-center gap-2">
    <button
      (click)="pageChange.emit(pagedResult.pageNumber - 1)"
      [disabled]="pagedResult.pageNumber === 1"
      class="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed"
    >
      ←
    </button>

    @for (page of pageNumbers; track page) {
      <button
        (click)="pageChange.emit(page)"
        class="px-3 py-1 rounded"
        [class.bg-blue-600]="page === pagedResult.pageNumber"
        [class.text-white]="page === pagedResult.pageNumber"
        [class.hover:bg-gray-100]="page !== pagedResult.pageNumber"
      >
        {{ page }}
      </button>
    }

    <button
      (click)="pageChange.emit(pagedResult.pageNumber + 1)"
      [disabled]="pagedResult.pageNumber === pagedResult.totalPages"
      class="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed"
    >
      →
    </button>
  </div>
}
